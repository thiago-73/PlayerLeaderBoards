name: Build Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: mvn -B clean package

      - name: Subir el jar compilado como descargable
        uses: actions/upload-artifact@v4
        with:
          name: PlayerLeaderBoards-jar
          path: target/PlayerLeaderBoards-1.4.jar
