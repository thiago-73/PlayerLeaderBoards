# PlayerLeaderBoards Configuration File
# Configure various aspects of the leaderboard system

# General Settings
general:
  # Auto-save interval in minutes (how often data is saved to files)
  auto-save-interval: 5

  # Maximum number of players shown in leaderboards
  max-leaderboard-entries: 10

  # Enable debug messages in console
  debug-mode: false

# Hologram Settings
holograms:
  # Height offset above player when spawning holograms
  spawn-height: 3.0

  # Line spacing between hologram entries
  line-spacing: 0.3

  # Auto-refresh holograms every X minutes (0 to disable)
  auto-refresh-minutes: 0

  # Hologram titles and formatting
  titles:
    kills: "&6≡ TOP KILLS ≡"
    playtime: "&b≡ TOP PLAYTIME ≡"
    messages: "&a≡ TOP MESSAGES ≡"
    blocksmined: "&2≡ TOP BLOQUES MINADOS ≡"
    distancewalked: "&d≡ TOP DISTANCIA CAMINADA ≡"

  # Hologram entry formatting
  # Available placeholders: {rank}, {player}, {value}
  formats:
    kills: "&e#{rank} &f{player} &7- &c{value} kills"
    playtime: "&e#{rank} &f{player} &7- &b{value}"
    messages: "&e#{rank} &f{player} &7- &a{value} messages"
    blocksmined: "&e#{rank} &f{player} &7- &2{value} bloques"
    distancewalked: "&e#{rank} &f{player} &7- &d{value}"

# Data Storage Settings
storage:
  # File names for data storage
  files:
    kills: "kills.yml"
    playtime: "playtime.yml"
    messages: "messages.yml"
    blocksmined: "blocksmined.yml"
    distancewalked: "distancewalked.yml"

  # Backup data files on plugin disable
  create-backups: true

  # Maximum backup files to keep
  max-backups: 5

# Tracking Settings
tracking:
  # Track player kills
  track-kills: true

  # Track player playtime
  track-playtime: true

  # Track player messages (requires AsyncPlayerChatEvent)
  track-messages: true

  # Track blocks mined
  track-blocksmined: true

  # Track distance walked (in blocks)
  track-distancewalked: true

  # Minimum playtime in minutes before tracking (prevents spam accounts)
  min-playtime-threshold: 1

# Chat Integration
chat:
  # Enable chat leaderboard commands
  enable-chat-commands: true

  # Show player stats on join
  show-stats-on-join: false

  # Broadcast top player achievements
  broadcast-achievements: true

  # Achievement broadcast messages
  achievements:
    new-kill-record: "&6{player} &ehas reached &c{kills} kills &eand taken #1 on the kills leaderboard!"
    new-playtime-record: "&6{player} &ehas played for &b{playtime} &eand leads the playtime leaderboard!"
    new-blocksmined-record: "&6{player} &ehas mined &2{blocksmined} blocks &eand leads the mining leaderboard!"
    new-distancewalked-record: "&6{player} &ehas walked &d{distancewalked} &eand leads the distance leaderboard!"

# Permission Settings
permissions:
  # Allow players to view their own stats without permission
  allow-self-stats: true

  # Require permission to view other players' stats
  require-permission-for-others: true

# Performance Settings
performance:
  # Use async tasks for data operations
  async-data-operations: true

  # Cache player names to reduce database queries
  cache-player-names: true

  # Cache size for player names
  name-cache-size: 100
