name: PlayerLeaderBoards
version: 1.4
main: com.Mateitaa1.PlayerLeaderBoards.PlayerLeaderBoards
api-version: 1.21
author: Mateitaa1
description: Advanced leaderboard system with holographic displays for player statistics
softdepend: [Multiverse-Core]

commands:
  spawnkillshologram:
    description: Spawns a holographic kills leaderboard at your location
    usage: /spawnkillshologram
    permission: playerleaderboards.admin

  spawnplaytimehologram:
    description: Spawns a holographic playtime leaderboard at your location
    usage: /spawnplaytimehologram
    permission: playerleaderboards.admin

  spawnmessageshologram:
    description: Spawns a holographic messages leaderboard at your location
    usage: /spawnmessageshologram
    permission: playerleaderboards.admin

  spawnblocksminedhologram:
    description: Spawns a holographic blocks-mined leaderboard at your location
    usage: /spawnblocksminedhologram
    permission: playerleaderboards.admin

  spawndistancewalkedhologram:
    description: Spawns a holographic distance-walked leaderboard at your location
    usage: /spawndistancewalkedhologram
    permission: playerleaderboards.admin

  removeholograms:
    description: Removes all active holograms
    usage: /removeholograms
    permission: playerleaderboards.admin

  cleanuporphanedholograms:
    description: Removes old/broken hologram armor stands within 100 blocks
    usage: /cleanuporphanedholograms
    aliases: [cleanholograms, cleanholos]
    permission: playerleaderboards.admin

  leaderboard:
    description: View leaderboards in chat
    usage: /leaderboard <kills|playtime|messages|blocksmined|distancewalked>
    aliases: [lb, top, stats]
    permission: playerleaderboards.view

permissions:
  playerleaderboards.admin:
    description: Allows managing holographic leaderboards
    default: op

  playerleaderboards.view:
    description: Allows viewing leaderboards in chat
    default: true

  playerleaderboards.*:
    description: Grants all plugin permissions
    default: op
    children:
      - playerleaderboards.admin
      - playerleaderboards.view
